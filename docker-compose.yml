services:
  postgres:
    image: postgres:15
    container_name: goatguard-db
    environment:
      POSTGRES_DB: goatguard
      POSTGRES_USER: goatguard
      POSTGRES_PASSWORD: goatguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goatguard -d goatguard"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  pgdata: