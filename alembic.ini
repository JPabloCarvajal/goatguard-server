# Alembic configuration para GOATGuard server [RF-13]
#
# La URL de la BD se resuelve en alembic/env.py con esta precedencia:
#   1. Config.set_main_option("sqlalchemy.url", ...) — usado por tests
#   2. Variable de entorno DATABASE_URL — usado en CI/producción
#   3. Fallback: src.config.models.ServerConfig().database
#
# Por eso ``sqlalchemy.url`` queda vacío aquí: que cada entorno la inyecte.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
